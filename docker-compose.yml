version: '3.8'

services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
      - /app/node_modules
    environment:
      - PORT=3000
      - NODE_ENV=development
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-test123}
      - SESSION_SECRET=${SESSION_SECRET:-test-secret}
    stdin_open: true
    tty: true
